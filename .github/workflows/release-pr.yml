name: Release PR ⬆️

# Step 1 of the release flow (modeled on DaleStudy/daleui): manually bump the
# version and open a `release/vX.Y.Z` PR. Merging that PR triggers tagging.yml.
on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type (patch/minor/major)"
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

jobs:
  release-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: fregante/setup-git-user@024bc0b8e177d7e77203b48dab6fb45666854b35 # v2

      - name: Bump version
        # --no-git-tag-version: only edit package.json; no auto commit/tag here.
        run: npm version ${{ inputs.bump }} --no-git-tag-version

      - name: Create release PR
        id: create-pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(jq -r '.version' package.json)
          BRANCH="release/v${VERSION}"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            BODY=$(git log "${LAST_TAG}..HEAD" --oneline | grep -oE "#[0-9]+" | sort -u | sed 's/^/- /')
          else
            BODY=$(git log --oneline | sed 's/^/- /' | head -50)
          fi
          [ -z "$BODY" ] && BODY="(no referenced PRs since ${LAST_TAG:-start})"

          git switch -c "$BRANCH" origin/main
          git commit -am "release: v${VERSION}"
          git push origin "$BRANCH"

          gh pr create --title "release: v${VERSION}" --body "$BODY"

      - name: Cleanup on failure
        if: failure()
        run: git push origin --delete "${{ steps.create-pr.outputs.branch }}" || true
