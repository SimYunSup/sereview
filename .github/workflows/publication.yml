name: Publication 📦

# Step 3: when a GitHub Release is published, publish to npm with provenance via
# OIDC Trusted Publishing — NO npm token. Requires a one-time setup on npmjs.com
# (Trusted Publisher → this repo + this workflow + the `npm` environment) and a
# GitHub Environment named `npm`. See docs/RELEASING.md.
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write # required for npm provenance / Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Verify tag matches package.json version
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"
          TAG_VERSION="${TAG_NAME#v}"
          PKG_VERSION=$(jq -r .version package.json)
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::tag ($TAG_VERSION) != package.json ($PKG_VERSION)"
            exit 1
          fi
          echo "✅ version match: $TAG_VERSION"

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm build

      # npm >= 11.5 is needed for OIDC Trusted Publishing; setup-node's bundled
      # npm may be older, so refresh it. Pin to the 11 major (a known-good, OIDC-
      # capable line) rather than @latest so a new major can't change this
      # id-token:write job under us without review.
      - run: npm install -g npm@11
      # Build already ran above, so skip lifecycle scripts on publish.
      - run: npm publish --provenance --ignore-scripts
